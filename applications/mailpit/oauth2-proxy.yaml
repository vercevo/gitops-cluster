# Auth gate in front of the Mailpit UI (Authentik OIDC). The HTTPRoute targets
# this, which proxies the Mailpit web UI (:8025) after login. Creds from the
# mailpit-oauth2-proxy secret (SOPS: platform/secrets/mailpit-oauth2-proxy.sops.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://authentik.bergtobias.com/application/o/mailpit/
            - --upstream=http://mailpit:8025
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://mail.bergtobias.com/oauth2/callback
            - --email-domain=*
            - --scope=openid profile email
            - --skip-provider-button=true
            - --cookie-secure=true
            - --reverse-proxy=true
          envFrom:
            - secretRef:
                name: mailpit-oauth2-proxy
          ports:
            - containerPort: 4180
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: mailpit
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 80
      targetPort: 4180
