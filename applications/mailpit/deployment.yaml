# Mailpit — a test mail catcher. SMTP on 1025 captures everything in-cluster apps
# send (point their SMTP at mailpit.mailpit.svc.cluster.local:1025); the captured
# mail is read in the web UI (8025), exposed at mail.bergtobias.com behind SSO.
# Nothing is delivered to the internet — this is a sink for testing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:v1.30.3
          env:
            - name: MP_MAX_MESSAGES
              value: "2000"
            - name: MP_SMTP_AUTH_ALLOW_INSECURE
              value: "true"
          ports:
            - { name: http, containerPort: 8025 }
            - { name: smtp, containerPort: 1025 }
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: mailpit
spec:
  selector:
    app: mailpit
  ports:
    - { name: http, port: 8025, targetPort: 8025 }
    - { name: smtp, port: 1025, targetPort: 1025 }
