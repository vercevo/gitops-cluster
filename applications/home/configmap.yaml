apiVersion: v1
kind: ConfigMap
metadata:
  name: home-html
  namespace: home
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>bergtobias.com · cluster</title>
      <!-- Umami analytics (self-hosted, privacy-friendly, no cookies) -->
      <script defer src="https://umami.bergtobias.com/script.js" data-website-id="644084ff-35bd-4efb-93eb-df61e7120c71"></script>
      <style>
        :root {
          --bg: #0b1020;
          --card: #151c33;
          --card-hover: #1d2747;
          --text: #e8ecf5;
          --muted: #93a0c0;
          --accent: #6ea8fe;
          --line: #243056;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background: radial-gradient(1200px 600px at 70% -10%, #1a2548 0%, var(--bg) 55%);
          color: var(--text);
          min-height: 100vh;
          padding: 4rem 1.25rem 3rem;
        }
        .wrap { max-width: 960px; margin: 0 auto; }
        header { margin-bottom: 2.5rem; }
        .badge {
          display: inline-block; font-size: .72rem; letter-spacing: .12em;
          text-transform: uppercase; color: var(--accent);
          border: 1px solid var(--line); border-radius: 999px;
          padding: .3rem .8rem; margin-bottom: 1rem;
        }
        h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -.02em; }
        h1 .dot { color: var(--accent); }
        .sub { color: var(--muted); margin-top: .6rem; font-size: 1.02rem; }
        .grid {
          display: grid; gap: 1rem;
          grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
          margin-top: 2rem;
        }
        a.card {
          display: block; text-decoration: none; color: inherit;
          background: var(--card); border: 1px solid var(--line);
          border-radius: 16px; padding: 1.15rem 1.2rem;
          transition: transform .15s ease, background .15s ease, border-color .15s ease;
        }
        a.card:hover { transform: translateY(-3px); background: var(--card-hover); border-color: var(--accent); }
        .card .ico { font-size: 1.6rem; }
        .card .name { font-weight: 650; margin-top: .55rem; font-size: 1.08rem; }
        .card .desc { color: var(--muted); font-size: .88rem; margin-top: .25rem; line-height: 1.4; }
        .card .host { color: var(--accent); font-size: .8rem; margin-top: .7rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .tag { font-size: .68rem; color: #f3b14e; border: 1px solid #5a4423; background: #2a2010; border-radius: 6px; padding: .1rem .4rem; margin-left: .5rem; vertical-align: middle; }
        h2.section { font-size: .8rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 2.2rem 0 .2rem; }
        footer { margin-top: 3rem; color: var(--muted); font-size: .82rem; border-top: 1px solid var(--line); padding-top: 1.2rem; }
      </style>
    </head>
    <body>
      <div class="wrap">
        <header>
          <span class="badge">k3s · ArgoCD GitOps</span>
          <h1>bergtobias<span class="dot">.</span>com</h1>
          <p class="sub">Single-node homelab cluster — everything below is applied from git by ArgoCD.</p>
        </header>

        <h2 class="section">Observability</h2>
        <div class="grid">
          <a class="card" href="https://grafana.bergtobias.com">
            <div class="ico">📊</div>
            <div class="name">Grafana</div>
            <div class="desc">Metrics, logs & traces — the LGTM single pane (Prometheus · Loki · Tempo).</div>
            <div class="host">grafana.bergtobias.com</div>
          </a>
        </div>

        <h2 class="section">Platform</h2>
        <div class="grid">
          <a class="card" href="https://argocd.bergtobias.com">
            <div class="ico">🚀</div>
            <div class="name">ArgoCD</div>
            <div class="desc">GitOps control plane — syncs the whole cluster from git.</div>
            <div class="host">argocd.bergtobias.com</div>
          </a>
          <a class="card" href="https://authentik.bergtobias.com">
            <div class="ico">🔐</div>
            <div class="name">Authentik</div>
            <div class="desc">Single sign-on (OIDC) for every app on the cluster.</div>
            <div class="host">authentik.bergtobias.com</div>
          </a>
          <a class="card" href="https://backstage.bergtobias.com">
            <div class="ico">🛠️</div>
            <div class="name">Backstage</div>
            <div class="desc">Developer portal & software catalog with TechDocs.</div>
            <div class="host">backstage.bergtobias.com</div>
          </a>
          <a class="card" href="https://s3.bergtobias.com">
            <div class="ico">🪣</div>
            <div class="name">MinIO</div>
            <div class="desc">S3 object storage — backs TechDocs, Loki & Tempo.</div>
            <div class="host">s3.bergtobias.com</div>
          </a>
        </div>

        <h2 class="section">Data</h2>
        <div class="grid">
          <a class="card" href="https://dagster.bergtobias.com">
            <div class="ico">⚙️</div>
            <div class="name">Dagster <span class="tag">paused</span></div>
            <div class="desc">ELT orchestration. Compute scaled to 0 to free RAM for observability.</div>
            <div class="host">dagster.bergtobias.com</div>
          </a>
          <a class="card" href="https://jaffle.bergtobias.com">
            <div class="ico">📈</div>
            <div class="name">Evidence <span class="tag">paused</span></div>
            <div class="desc">Analytics dashboards over the warehouse. Paused with Dagster.</div>
            <div class="host">jaffle.bergtobias.com</div>
          </a>
        </div>

        <footer>
          Served by nginx · <code>applications/home</code> · github.com/vercevo/gitops-cluster
        </footer>
      </div>
    </body>
    </html>
