apiVersion: apps/v1
kind: Deployment
metadata:
  name: notfound
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notfound
  template:
    metadata:
      labels:
        app: notfound
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: files
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: files
              mountPath: /usr/share/nginx/html/404.html
              subPath: 404.html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      volumes:
        - name: files
          configMap:
            name: notfound-files
---
apiVersion: v1
kind: Service
metadata:
  name: notfound
  namespace: home
spec:
  selector:
    app: notfound
  ports:
    - port: 80
      targetPort: 80
