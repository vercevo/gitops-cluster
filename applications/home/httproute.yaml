# Public landing page (static, no auth) — copy of the dagster/jaffle public route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home
  namespace: home
  annotations:
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/hostname: home.bergtobias.com
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - home.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: home
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
