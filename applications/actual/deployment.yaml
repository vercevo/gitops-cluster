apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-data
  namespace: actual
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual
  namespace: actual
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: actual
  template:
    metadata:
      labels:
        app: actual
    spec:
      containers:
        - name: actual
          image: actualbudget/actual-server:latest
          env:
            - name: ACTUAL_OPENID_DISCOVERY_URL
              value: https://authentik.bergtobias.com/application/o/actual/
            - name: ACTUAL_OPENID_CLIENT_ID
              value: dd2841af0491d44bdd04f4fc6f738ec30288a861
            - name: ACTUAL_OPENID_SERVER_HOSTNAME
              value: https://actual.bergtobias.com
            # ACTUAL_OPENID_CLIENT_SECRET from the actual-secrets secret (SOPS).
            - name: ACTUAL_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: actual-secrets
                  key: ACTUAL_OPENID_CLIENT_SECRET
          ports:
            - containerPort: 5006
          readinessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actual-data
---
apiVersion: v1
kind: Service
metadata:
  name: actual
  namespace: actual
spec:
  selector:
    app: actual
  ports:
    - port: 5006
      targetPort: 5006
