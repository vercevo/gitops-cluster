# Actual Budget at actual.bergtobias.com. Actual has native OIDC (unlike umami/
# dagster), so this HTTPRoute targets the actual Service directly — no
# oauth2-proxy gate. First OIDC login becomes the Actual server owner/admin.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual
  namespace: actual
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - actual.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: actual
          port: 5006
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
