# Umami at umami.bergtobias.com → oauth2-proxy (Authentik SSO gate). oauth2-proxy
# skip-auths the tracking endpoints (/script.js, /api/send) so home.bergtobias.com
# still works, and gates the dashboard behind Authentik. No CNAME — the wildcard
# resolves it.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami
  namespace: umami
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - umami.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: oauth2-proxy
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
