# Authentik SSO gate for the Umami dashboard. The HTTPRoute targets this. Crucially,
# the tracking endpoints (/script.js, /api/send, /api/collect) are exempted with
# --skip-auth-route so home.bergtobias.com can still load the tracker and post events
# without auth; everything else (the dashboard) requires Authentik login.
# NOTE: Umami OSS has no OIDC, so behind this gate Umami still shows its own login
# once (session persists) — that part can't be removed without switching tools.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: umami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://authentik.bergtobias.com/application/o/umami/
            - --upstream=http://umami:3000
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://umami.bergtobias.com/oauth2/callback
            - --email-domain=*
            - --scope=openid profile email
            - --skip-provider-button=true
            - --cookie-secure=true
            - --reverse-proxy=true
            # Public tracking endpoints — no auth (home page sends events here):
            - --skip-auth-route=^/script.js
            - --skip-auth-route=^/api/send
            - --skip-auth-route=^/api/collect
          envFrom:
            - secretRef:
                name: umami-oauth2-proxy
          ports:
            - containerPort: 4180
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: umami
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 80
      targetPort: 4180
