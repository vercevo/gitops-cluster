# Party page behind Authentik SSO: the route targets oauth2-proxy (which proxies
# the johanjoel nginx after login), not the johanjoel Service directly. No CNAME —
# the *.bergtobias.com wildcard resolves it; Traefik host-routes by hostname.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: johanjoel
  namespace: johanjoel
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - johanjoel.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: oauth2-proxy
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
