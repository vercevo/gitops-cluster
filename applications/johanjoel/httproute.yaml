# Public party page (static, no auth). No external-dns annotation / CNAME needed —
# the *.bergtobias.com wildcard resolves it; Traefik host-routes by hostname.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: johanjoel
  namespace: johanjoel
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - johanjoel.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: johanjoel
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
