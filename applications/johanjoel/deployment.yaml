apiVersion: apps/v1
kind: Deployment
metadata:
  name: johanjoel
  namespace: johanjoel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: johanjoel
  template:
    metadata:
      labels:
        app: johanjoel
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      volumes:
        - name: html
          configMap:
            name: johanjoel-html
---
apiVersion: v1
kind: Service
metadata:
  name: johanjoel
  namespace: johanjoel
spec:
  selector:
    app: johanjoel
  ports:
    - port: 80
      targetPort: 80
