# Warehouse DB — the analytics data Dagster materializes and Evidence reads.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: jaffle-pg
  namespace: dagster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  # Expose CNPG metrics to Prometheus (PodMonitor CRD from kube-prometheus-stack).
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
  managed:
    roles:
      - name: jaffle
        ensure: present
        createdb: true
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: jaffle-pg-user
  bootstrap:
    initdb:
      database: jaffle
      owner: jaffle
      secret:
        name: jaffle-pg-user
---
# Metadata DB — Dagster's own run/event/schedule storage (chart Postgres disabled).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dagster-pg
  namespace: dagster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  # Expose CNPG metrics to Prometheus (PodMonitor CRD from kube-prometheus-stack).
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
  managed:
    roles:
      - name: dagster
        ensure: present
        createdb: true
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: dagster-pg-user
  bootstrap:
    initdb:
      database: dagster
      owner: dagster
      secret:
        name: dagster-pg-user
