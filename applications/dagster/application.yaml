apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://dagster-io.github.io/helm
      chart: dagster
      targetRevision: "1.13.*"
      helm:
        valueFiles:
          - $values/applications/dagster/values.yaml
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      path: applications/dagster
      directory:
        include: "{postgres.yaml,evidence.yaml,oauth2-proxy.yaml,httproute.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster
  syncPolicy:
    # Auto-sync intentionally disabled: this single 7.6Gi node cannot run Dagster
    # (esp. the memory-hungry Evidence build, which was OOM-crash-looping) and the
    # kube-prometheus-stack observability stack at the same time. Disabling auto-sync
    # lets the Dagster compute be scaled to 0 without selfHeal reverting it; the
    # CNPG Postgres data (jaffle-pg/dagster-pg) is left running and untouched.
    # Re-enable (restore the `automated` block) once the node has more RAM.
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
