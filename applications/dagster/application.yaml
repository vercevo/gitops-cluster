apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://dagster-io.github.io/helm
      chart: dagster
      targetRevision: "1.13.*"
      helm:
        valueFiles:
          - $values/applications/dagster/values.yaml
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      path: applications/dagster
      directory:
        include: "{postgres.yaml,evidence.yaml,oauth2-proxy.yaml,httproute.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster
  syncPolicy:
    # Dagster COMPUTE is zeroed in git (values.yaml: webserver replicaCount 0, daemon +
    # user-deployments disabled; evidence.yaml + oauth2-proxy.yaml replicas: 0) because
    # this single 7.6Gi node cannot run Dagster — especially the OOM-crash-looping
    # Evidence build — alongside the kube-prometheus-stack observability stack. selfHeal
    # therefore KEEPS the compute at zero. The CNPG Postgres DATA (jaffle-pg/dagster-pg,
    # in postgres.yaml) is left running and untouched. To re-enable Dagster once the node
    # has more RAM, restore the replica counts / enabled flags.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
