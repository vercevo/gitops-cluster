# Dagster UI -> oauth2-proxy (which proxies the webserver after Authentik login).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dagster
  namespace: dagster
  annotations:
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/hostname: dagster.bergtobias.com
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - dagster.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: oauth2-proxy
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
# Evidence dashboard (public, read-only static site).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaffle
  namespace: dagster
  annotations:
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/hostname: jaffle.bergtobias.com
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - jaffle.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: evidence
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
