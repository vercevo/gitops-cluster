apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: techdocs
  namespace: minio
  labels:
    app: minio
spec:
  # Root credentials live in this secret (config.env). Created via bootstrap,
  # NOT in git. See bootstrap/minio-secret.sh.
  configuration:
    name: minio-tenant-config
  # Homelab: TLS is terminated at Traefik/Cloudflare, so the tenant serves
  # plain HTTP internally. Disable the operator's self-signed cert.
  requestAutoCert: false
  # Console (admin UI) login via Authentik OIDC. Role-policy mode: every user who
  # authenticates through the Authentik `minio` app gets the built-in `consoleAdmin`
  # policy — access is gated by Authentik, not a custom `policy` claim. Client
  # id/secret come from the `minio-oidc` secret (bootstrap/minio-oidc-secret.sh).
  env:
    - name: MINIO_IDENTITY_OPENID_CONFIG_URL
      value: https://authentik.bergtobias.com/application/o/minio/.well-known/openid-configuration
    - name: MINIO_IDENTITY_OPENID_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: minio-oidc
          key: client-id
    - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: minio-oidc
          key: client-secret
    - name: MINIO_IDENTITY_OPENID_SCOPES
      value: "openid,profile,email"
    - name: MINIO_IDENTITY_OPENID_ROLE_POLICY
      value: consoleAdmin
    - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
      value: "Log in with Authentik"
    # External console URL — MinIO derives the OIDC callback as <url>/oauth_callback.
    - name: MINIO_BROWSER_REDIRECT_URL
      value: https://minio.bergtobias.com
  pools:
    - name: pool-0
      # Single-node single-drive (SNSD) — sufficient for static TechDocs HTML.
      servers: 1
      volumesPerServer: 1
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
  # Operator auto-creates these buckets on first reconcile.
  buckets:
    - name: techdocs
    - name: loki    # Loki log chunks + index (see platform/loki)
    - name: tempo   # Tempo trace blocks (see platform/tempo)
