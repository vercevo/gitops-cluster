apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: techdocs
  namespace: minio
  labels:
    app: minio
spec:
  # Root credentials live in this secret (config.env). Created via bootstrap,
  # NOT in git. See bootstrap/minio-secret.sh.
  configuration:
    name: minio-tenant-config
  # Homelab: TLS is terminated at Traefik/Cloudflare, so the tenant serves
  # plain HTTP internally. Disable the operator's self-signed cert.
  requestAutoCert: false
  # Console (admin UI) login uses Authentik OIDC in role-policy mode (every user
  # who authenticates through the Authentik `minio` app gets the built-in
  # `consoleAdmin` policy; access is gated by Authentik). The OIDC settings are
  # injected via the `config.env` secret (the same one that holds the root creds),
  # NOT here — operator v7.1.1 does not render Tenant `spec.env` into the
  # StatefulSet. See bootstrap/minio-oidc-secret.sh. The console route is in
  # console-httproute.yaml.
  pools:
    - name: pool-0
      # Single-node single-drive (SNSD) — sufficient for static TechDocs HTML.
      servers: 1
      volumesPerServer: 1
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
  # Operator auto-creates these buckets on first reconcile.
  buckets:
    - name: techdocs
    - name: loki    # Loki log chunks + index (see platform/loki)
    - name: tempo   # Tempo trace blocks (see platform/tempo)
