# MinIO Console (admin UI) at minio.bergtobias.com — Authentik OIDC login
# (role policy consoleAdmin). The console is embedded in the MinIO server and
# served by the techdocs-console Service on 9090. No external-dns annotation —
# the *.bergtobias.com wildcard CNAME resolves it.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: minio
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - minio.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: techdocs-console
          port: 9090
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
