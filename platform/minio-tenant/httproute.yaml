# Exposes the MinIO S3 API externally so CI (techdocs-cli publish) can push
# built docs. The operator creates a Service named "minio" (port 80 -> 9000
# when requestAutoCert is false). Backstage itself reads via the in-cluster
# service and does NOT need this route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-s3
  namespace: minio
  annotations:
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/hostname: s3.bergtobias.com
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - s3.bergtobias.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: minio
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
