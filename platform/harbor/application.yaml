apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: 1.16.*
      helm:
        releaseName: harbor
        values: |
          expose:
            type: clusterIP
            tls:
              enabled: false
            clusterIP:
              name: harbor
              ports:
                httpPort: 80
          externalURL: https://harbor.bergtobias.com
          existingSecretAdminPassword: harbor-admin
          existingSecretAdminPasswordKey: password
          persistence:
            enabled: true
            persistentVolumeClaim:
              registry:
                size: 20Gi
              jobservice:
                size: 1Gi
              database:
                size: 5Gi
              redis:
                size: 1Gi
          trivy:
            enabled: false
          database:
            type: internal
          redis:
            type: internal
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      path: platform/harbor
      directory:
        include: "*.yaml"
        exclude: "application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
