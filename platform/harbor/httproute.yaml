apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
  annotations:
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/hostname: harbor.bergtobias.com
spec:
  parentRefs:
    - name: main
      namespace: traefik
      sectionName: websecure
  hostnames:
    - harbor.bergtobias.com
  rules:
    - backendRefs:
        - name: harbor
          port: 80
