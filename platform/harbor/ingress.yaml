apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor
  namespace: harbor
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/hostname: harbor.bergtobias.com
    external-dns.alpha.kubernetes.io/target: "07a7a2df-49c5-41a5-8e59-6403b236a5d5.cfargotunnel.com"
spec:
  ingressClassName: traefik
  rules:
  - host: harbor.bergtobias.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: harbor
            port:
              number: 80
  tls:
  - hosts:
    - harbor.bergtobias.com
    secretName: harbor-tls
