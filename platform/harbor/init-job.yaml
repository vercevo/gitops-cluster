apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-init
  namespace: harbor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harbor-init
  namespace: backstage
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-init
  namespace: backstage
subjects:
  - kind: ServiceAccount
    name: harbor-init
    namespace: harbor
roleRef:
  kind: Role
  name: harbor-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-init-script
  namespace: harbor
data:
  init.py: |
    import json, urllib.request, urllib.error, base64, sys, time, os, ssl

    HARBOR = "http://harbor"
    PASS = open("/admin-secret/password").read().strip()
    H = {"Authorization": "Basic " + base64.b64encode(f"admin:{PASS}".encode()).decode(),
         "Content-Type": "application/json"}

    def api(method, path, body=None):
        req = urllib.request.Request(
            f"{HARBOR}/api/v2.0{path}",
            data=json.dumps(body).encode() if body is not None else None,
            method=method, headers=H)
        try:
            with urllib.request.urlopen(req) as r:
                data = r.read()
                return r.status, json.loads(data) if data else {}
        except urllib.error.HTTPError as e:
            data = e.read()
            return e.code, json.loads(data) if data else {}

    # Setup k8s client
    k8s = f"https://{os.environ['KUBERNETES_SERVICE_HOST']}:{os.environ['KUBERNETES_SERVICE_PORT']}"
    sa_token = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read()
    ctx = ssl.create_default_context(cafile="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")

    def k8s_req(method, path, body=None, patch=False):
        ct = "application/strategic-merge-patch+json" if patch else "application/json"
        req = urllib.request.Request(f"{k8s}{path}",
            data=json.dumps(body).encode() if body else None,
            method=method,
            headers={"Authorization": f"Bearer {sa_token}", "Content-Type": ct})
        try:
            with urllib.request.urlopen(req, context=ctx) as r:
                return r.status, json.loads(r.read())
        except urllib.error.HTTPError as e:
            return e.code, {}

    # Skip if harbor-pull already exists
    status, _ = k8s_req("GET", "/api/v1/namespaces/backstage/secrets/harbor-pull")
    if status == 200:
        print("harbor-pull already exists — skipping init")
        sys.exit(0)

    # Wait for Harbor
    print("Waiting for Harbor...")
    for _ in range(120):
        try:
            with urllib.request.urlopen(f"{HARBOR}/api/v2.0/health", timeout=5) as r:
                if json.loads(r.read()).get("status") == "healthy":
                    print("Harbor healthy")
                    break
        except Exception:
            pass
        time.sleep(5)
    else:
        print("ERROR: Harbor never became healthy", file=sys.stderr)
        sys.exit(1)

    # Create ghcr.io registry endpoint
    _, regs = api("GET", "/registries?name=ghcr.io")
    if not regs:
        s, _ = api("POST", "/registries", {
            "name": "ghcr.io", "type": "docker-registry",
            "url": "https://ghcr.io",
            "credential": {"type": "basic", "access_key": "x-access-token", "access_secret": "placeholder"},
            "insecure": False})
        print(f"Created ghcr.io registry: {s}")
        _, regs = api("GET", "/registries?name=ghcr.io")
    registry_id = regs[0]["id"]
    print(f"Registry ID: {registry_id}")

    # Create project vercevo (private)
    s, _ = api("POST", "/projects", {"project_name": "vercevo", "public": False, "metadata": {}})
    print(f"Project vercevo: {s}")  # 201 created, 409 already exists

    # Create replication policy
    _, policies = api("GET", "/replication/policies?name=backstage")
    if not policies:
        s, _ = api("POST", "/replication/policies", {
            "name": "backstage",
            "src_registry": {"id": registry_id},
            "dest_namespace": "vercevo",
            "filters": [{"type": "name", "value": "vercevo/backstage"}],
            "trigger": {"type": "manual"},
            "deletion": False, "override": True, "enabled": True})
        print(f"Created replication policy: {s}")

    # Create robot account for k8s pulls
    s, robot = api("POST", "/robots", {
        "name": "k8s-puller",
        "level": "project",
        "duration": -1,
        "description": "k8s image pull",
        "permissions": [{"kind": "project", "namespace": "vercevo",
            "access": [{"resource": "repository", "action": "pull"},
                       {"resource": "artifact", "action": "read"}]}]})
    if s != 201:
        print(f"ERROR: Robot creation failed: {s} {robot}", file=sys.stderr)
        sys.exit(1)
    print(f"Robot created: {robot['name']}")

    # Build dockerconfigjson
    docker_cfg = json.dumps({"auths": {"harbor.bergtobias.com":
        {"auth": base64.b64encode(f"{robot['name']}:{robot['secret']}".encode()).decode()}}})
    secret_body = {
        "apiVersion": "v1", "kind": "Secret",
        "metadata": {"name": "harbor-pull", "namespace": "backstage"},
        "type": "kubernetes.io/dockerconfigjson",
        "data": {".dockerconfigjson": base64.b64encode(docker_cfg.encode()).decode()}}

    base_path = "/api/v1/namespaces/backstage/secrets"
    for method, path, patch in [
        ("PATCH", f"{base_path}/harbor-pull", True),
        ("POST", base_path, False)
    ]:
        s, _ = k8s_req(method, path, secret_body, patch)
        if s in (200, 201):
            print(f"harbor-pull secret {method}: {s}")
            break
        elif s == 404 and method == "PATCH":
            continue
        else:
            print(f"ERROR: Secret {method} failed: {s}", file=sys.stderr)
            sys.exit(1)

    print("Harbor init complete!")
---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-init
  namespace: harbor
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: harbor-init
      restartPolicy: OnFailure
      volumes:
        - name: admin-secret
          secret:
            secretName: harbor-admin
        - name: script
          configMap:
            name: harbor-init-script
      containers:
        - name: init
          image: python:3.12-slim
          command: [python3, /script/init.py]
          volumeMounts:
            - name: admin-secret
              mountPath: /admin-secret
            - name: script
              mountPath: /script
