global:
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: secret-key
    - name: AUTHENTIK_POSTGRESQL__HOST
      value: authentik-pg-rw
    - name: AUTHENTIK_POSTGRESQL__NAME
      value: authentik
    - name: AUTHENTIK_POSTGRESQL__USER
      value: authentik
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-pg-user
          key: password
    - name: AUTHENTIK_REDIS__HOST
      value: authentik-redis
    - name: AUTHENTIK_LOG_LEVEL
      value: info
    # OIDC client secrets for the oidc-apps blueprint (!Env). Injected from the
    # authentik-oidc-secrets Secret (platform/secrets/authentik-oidc-secrets.sops.yaml)
    # so the secret values never live in the in-git blueprint ConfigMap.
    - name: OIDC_ARGOCD_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_ARGOCD_CLIENT_SECRET } }
    - name: OIDC_BACKSTAGE_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_BACKSTAGE_CLIENT_SECRET } }
    - name: OIDC_HARBOR_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_HARBOR_CLIENT_SECRET } }
    - name: OIDC_DAGSTER_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_DAGSTER_CLIENT_SECRET } }
    - name: OIDC_GRAFANA_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_GRAFANA_CLIENT_SECRET } }
    - name: OIDC_MINIO_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_MINIO_CLIENT_SECRET } }
    - name: OIDC_JOHANJOEL_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_JOHANJOEL_CLIENT_SECRET } }
    - name: OIDC_MAILPIT_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_MAILPIT_CLIENT_SECRET } }
    - name: OIDC_UMAMI_CLIENT_SECRET
      valueFrom: { secretKeyRef: { name: authentik-oidc-secrets, key: OIDC_UMAMI_CLIENT_SECRET } }

postgresql:
  enabled: false

redis:
  enabled: false

server:
  ingress:
    enabled: false

# Mount custom blueprints (config-as-code) from the authentik-blueprints ConfigMap
# (platform/authentik/blueprints-configmap.yaml). Authentik auto-applies them.
blueprints:
  configMaps:
    - authentik-blueprints
