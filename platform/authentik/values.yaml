authentik:
  postgresql:
    host: authentik-postgresql
    name: authentik
    user: authentik
  redis:
    host: authentik-redis

# Pass secrets via env vars — authentik maps AUTHENTIK_* env vars to config
global:
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: secret-key
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: postgresql-password
    - name: AUTHENTIK_LOG_LEVEL
      value: info

# Disable bundled Bitnami subcharts (broken image tags)
postgresql:
  enabled: false

redis:
  enabled: false

server:
  ingress:
    enabled: false
