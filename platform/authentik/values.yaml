authentik:
  secret_key:
    valueFrom:
      secretKeyRef:
        name: authentik-secrets
        key: secret-key
  postgresql:
    host: authentik-postgresql
    name: authentik
    user: authentik
    password:
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: postgresql-password
  redis:
    host: authentik-redis

# Disable bundled Bitnami subcharts (broken image tags)
postgresql:
  enabled: false

redis:
  enabled: false

server:
  ingress:
    enabled: false

global:
  env:
    - name: AUTHENTIK_LOG_LEVEL
      value: info
