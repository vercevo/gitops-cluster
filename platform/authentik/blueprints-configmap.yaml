# Custom Authentik blueprints (config-as-code), mounted via
# values.yaml blueprints.configMaps and auto-applied by the worker.
# oidc-apps.yaml is GENERATED from the live providers (scripts/gen-authentik-blueprints).
# Client secrets are NOT here — set via !Env, injected from the authentik-oidc-secrets
# Secret (platform/secrets/authentik-oidc-secrets.sops.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  gitops-groups.yaml: |
    version: 1
    metadata:
      name: gitops-groups
      labels:
        blueprints.goauthentik.io/description: "Cluster groups (GitOps-managed)"
    entries:
      - model: authentik_core.group
        identifiers:
          name: Grafana Admins
        attrs:
          name: Grafana Admins
      - model: authentik_core.group
        identifiers:
          name: Actual-users
        attrs:
          name: Actual-users

  oidc-apps.yaml: |
    version: 1
    metadata:
      name: oidc-apps
      labels:
        blueprints.goauthentik.io/description: "OIDC providers + applications (GitOps)"
    entries:
      # ---- ArgoCD ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-argocd
        identifiers:
          name: "ArgoCD"
        attrs:
          name: "ArgoCD"
          client_type: confidential
          client_id: "argocd"
          client_secret: !Env OIDC_ARGOCD_CLIENT_SECRET
          sub_mode: user_username
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings: []
          redirect_uris:
            - matching_mode: regex
              url: "https://argocd\\.bergtobias\\.com/.*"
      - model: authentik_core.application
        identifiers:
          slug: "argocd"
        attrs:
          name: "ArgoCD"
          slug: "argocd"
          provider: !KeyOf provider-argocd
          meta_launch_url: "https://argocd.bergtobias.com"
      # ---- Backstage ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-backstage
        identifiers:
          name: "Backstage"
        attrs:
          name: "Backstage"
          client_type: confidential
          client_id: "backstage"
          client_secret: !Env OIDC_BACKSTAGE_CLIENT_SECRET
          sub_mode: user_email
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: Groups"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: regex
              url: "https://backstage\\.bergtobias\\.com/.*"
      - model: authentik_core.application
        identifiers:
          slug: "backstage"
        attrs:
          name: "Backstage"
          slug: "backstage"
          provider: !KeyOf provider-backstage
          meta_launch_url: "https://backstage.bergtobias.com"
      # ---- dagster ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-dagster
        identifiers:
          name: "dagster"
        attrs:
          name: "dagster"
          client_type: confidential
          client_id: "NwBvEwcGEcz7d67khyT2hHtsbcJXEI8DjbbChgzS"
          client_secret: !Env OIDC_DAGSTER_CLIENT_SECRET
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: strict
              url: "https://dagster.bergtobias.com/oauth2/callback"
      - model: authentik_core.application
        identifiers:
          slug: "dagster"
        attrs:
          name: "Dagster"
          slug: "dagster"
          provider: !KeyOf provider-dagster
      # ---- grafana ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-grafana
        identifiers:
          name: "grafana"
        attrs:
          name: "grafana"
          client_type: confidential
          client_id: "CEBD4vYRtbw6KYL4ZI7YiEvLddygsySRMEOO0ois"
          client_secret: !Env OIDC_GRAFANA_CLIENT_SECRET
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: Groups"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: strict
              url: "https://grafana.bergtobias.com/login/generic_oauth"
      - model: authentik_core.application
        identifiers:
          slug: "grafana"
        attrs:
          name: "Grafana"
          slug: "grafana"
          provider: !KeyOf provider-grafana
      # ---- minio ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-minio
        identifiers:
          name: "minio"
        attrs:
          name: "minio"
          client_type: confidential
          client_id: "9TCmzHnQj2Xageyi7c3nE54BUXKQAZfur6NVsGdV"
          client_secret: !Env OIDC_MINIO_CLIENT_SECRET
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: strict
              url: "https://minio.bergtobias.com/oauth_callback"
      - model: authentik_core.application
        identifiers:
          slug: "minio"
        attrs:
          name: "MinIO"
          slug: "minio"
          provider: !KeyOf provider-minio
      # ---- johanjoel (party page, SSO-protected via oauth2-proxy) ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-johanjoel
        identifiers:
          name: "johanjoel"
        attrs:
          name: "johanjoel"
          client_type: confidential
          client_id: "69d5a2c12c66a26598093bc8e6926ef77aa07a19"
          client_secret: !Env OIDC_JOHANJOEL_CLIENT_SECRET
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: strict
              url: "https://johanjoel.bergtobias.com/oauth2/callback"
      - model: authentik_core.application
        identifiers:
          slug: "johanjoel"
        attrs:
          name: "Johan & Joel"
          slug: "johanjoel"
          provider: !KeyOf provider-johanjoel
          meta_launch_url: "https://johanjoel.bergtobias.com"
      # ---- umami (analytics dashboard, SSO gate via oauth2-proxy) ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-umami
        identifiers:
          name: "umami"
        attrs:
          name: "umami"
          client_type: confidential
          client_id: "7a81487e1227851642f03c80617796dc0b461840"
          client_secret: !Env OIDC_UMAMI_CLIENT_SECRET
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: strict
              url: "https://umami.bergtobias.com/oauth2/callback"
      - model: authentik_core.application
        identifiers:
          slug: "umami"
        attrs:
          name: "Umami"
          slug: "umami"
          provider: !KeyOf provider-umami
          meta_launch_url: "https://umami.bergtobias.com"
      # ---- actual (native OIDC, no oauth2-proxy) ----
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-actual
        identifiers:
          name: "actual"
        attrs:
          name: "actual"
          client_type: confidential
          client_id: "dd2841af0491d44bdd04f4fc6f738ec30288a861"
          client_secret: !Env OIDC_ACTUAL_CLIENT_SECRET
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          redirect_uris:
            - matching_mode: strict
              url: "https://actual.bergtobias.com/openid/callback"
      - model: authentik_core.application
        identifiers:
          slug: "actual"
        attrs:
          name: "Actual Budget"
          slug: "actual"
          provider: !KeyOf provider-actual
          meta_launch_url: "https://actual.bergtobias.com"
      # Gate access: only members of "Actual-users" may reach/log into this app
      # (direct group binding, no expression policy needed).
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, "actual"]]
          group: !Find [authentik_core.group, [name, "Actual-users"]]
          order: 0
        attrs:
          enabled: true
          negate: false

