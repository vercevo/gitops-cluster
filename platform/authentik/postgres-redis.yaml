# PostgreSQL managed by CloudNativePG operator
# Primary read-write service: authentik-pg-rw:5432
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  # Expose CNPG metrics to Prometheus (PodMonitor CRD from kube-prometheus-stack).
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-pg-user
---
# Redis — simple single-instance, no sentinel needed for Authentik
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: authentik-redis
  namespace: authentik
spec:
  serviceName: authentik-redis
  replicas: 1
  selector:
    matchLabels:
      app: authentik-redis
  template:
    metadata:
      labels:
        app: authentik-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-redis
  namespace: authentik
spec:
  selector:
    app: authentik-redis
  ports:
    - port: 6379
