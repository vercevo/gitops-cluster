# OpenTelemetry Collector — the OTLP ingestion gateway. Apps send spans to
# opentelemetry-collector.opentelemetry.svc.cluster.local:4317 (gRPC) / :4318 (HTTP);
# the collector forwards traces to Tempo. (Metrics stay on Prometheus scraping and
# logs on Promtail for now — wire those pipelines here later if you want a single
# agent.) Sized lean for the 7.6Gi node.

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
command:
  name: otelcol-contrib

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    memory: 256Mi

presets:
  # Tag spans with k8s metadata (namespace/pod/node) for correlation in Grafana.
  kubernetesAttributes:
    enabled: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
  processors:
    batch: {}
  exporters:
    otlp/tempo:
      endpoint: tempo.tempo.svc.cluster.local:4317
      tls:
        insecure: true
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]
      # No metrics/logs pipelines for now (Prometheus + Promtail handle those).
      metrics: null
      logs: null
