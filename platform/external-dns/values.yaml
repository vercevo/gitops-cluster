provider:
  name: cloudflare

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: token

# Only manage records under the cluster subdomain — never touch the root zone.
domainFilters:
  - k8s.bergtobias.com

# Sync mode: upsert-only is safer to start; switch to sync to auto-delete stale records.
policy: upsert-only

# Sources to watch for hostnames
sources:
  - ingress
  - service

# Annotate services/ingresses with external-dns.alpha.kubernetes.io/hostname
# to opt individual resources in. Alternatively, use txtOwnerId to track ownership.
txtOwnerId: k8s-bergtobias

# Only process resources with this annotation to avoid touching unintended records.
# Remove to auto-register all Ingress hosts.
annotationFilter: "external-dns.alpha.kubernetes.io/managed=true"

logLevel: info
