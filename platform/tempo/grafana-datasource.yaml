# Tempo datasource for Grafana. In the `monitoring` namespace with the
# `grafana_datasource: "1"` label so the Grafana datasource sidecar provisions it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.tempo.svc.cluster.local:3200
        isDefault: false
