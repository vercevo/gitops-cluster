apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  annotations:
    # Wave 1: after the sops-secrets-operator (wave 0) installs the SopsSecret CRD.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vercevo/gitops-cluster
    targetRevision: HEAD
    path: platform/secrets
    directory:
      # The *.sops.yaml files are SopsSecret CRs (values encrypted); each declares
      # its own target namespace. The operator decrypts them into real k8s Secrets.
      include: "*.sops.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: sops-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
