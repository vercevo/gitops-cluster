deployment:
  replicas: 1

service:
  type: LoadBalancer
  externalIPs:
    - 83.233.119.184

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesGateway:
    enabled: true

ports:
  web:
    port: 8000
    exposedPort: 80
    protocol: TCP
    redirectTo:
      port: websecure
      priority: 10
  websecure:
    port: 8443
    exposedPort: 443
    protocol: TCP
    tls:
      enabled: true

logs:
  general:
    level: INFO
  access:
    enabled: true

metrics:
  prometheus:
    enabled: true
    # Dedicated metrics service + ServiceMonitor so kube-prometheus-stack scrapes
    # Traefik. The ServiceMonitor CRD ships with that chart (sync-wave 1).
    service:
      enabled: true
    serviceMonitor:
      enabled: true

# Dashboard disabled by default — expose intentionally if needed
ingressRoute:
  dashboard:
    enabled: false
