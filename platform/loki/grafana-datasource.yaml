# Loki datasource for Grafana. Lives in the `monitoring` namespace and carries the
# `grafana_datasource: "1"` label so the kube-prometheus-stack Grafana datasource
# sidecar auto-provisions it (the sidecar watches its own namespace by default).
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.loki.svc.cluster.local:3100
        isDefault: false
