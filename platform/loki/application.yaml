apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    # Wave 2: after MinIO (its S3 backend) and kube-prometheus-stack (Grafana,
    # whose datasource sidecar picks up the configmap shipped here).
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: "6.55.*"
      helm:
        valueFiles:
          - $values/platform/loki/values.yaml
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/vercevo/gitops-cluster
      targetRevision: HEAD
      path: platform/loki
      directory:
        include: "{grafana-datasource.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
