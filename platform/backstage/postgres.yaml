apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage-pg
  namespace: backstage
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  storage:
    size: 10Gi
  bootstrap:
    initdb:
      database: backstage
      owner: backstage
      secret:
        name: backstage-pg-user
